<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #eef0f3;
  color: #202020;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 0.4s ease;
}

body.fade-out {
  opacity: 0;
  transition: opacity 0.4s ease;
}

.boot-wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

.boot-header {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.35);
  margin-bottom: 6px;
  white-space: nowrap;
}

.boot-loading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

.boot-bar-track {
  width: 100%;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 32px;
}
.boot-bar-fill {
  height: 100%;
  width: 90%;
  background: #202020;
  animation: boot-bar-blink 1.4s ease-in-out infinite;
}
@keyframes boot-bar-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

.boot-select {
  display: block;
  margin-bottom: 20px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: rgba(0,0,0,0.8);
  line-height: 1.2;
}

.boot-links {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.boot-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 14px;
  text-decoration: none;
  cursor: pointer;
  width: fit-content;
}
.boot-line-names {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: rgba(0,0,0,0.55);
  margin-bottom: 2px;
  transition: color 0.15s;
}
.boot-line-signal {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.5);
}
.boot-line:hover .boot-line-names { color: #202020; }

.boot-dot {
  width: 6px;
  height: 6px;
  min-width: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
}
.boot-dot.green { background: #2ecc71; box-shadow: 0 0 4px rgba(46,204,113,0.6); }
.boot-dot.red { background: #e63946; box-shadow: 0 0 4px rgba(230,57,70,0.6); animation: pulse-dot 1.4s ease-in-out infinite; }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
</style>
</head>
<body>

<div class="boot-wrap">
  <div class="boot-header">ARCH TERMINAL · RESTRICTED ACCESS</div>
  <div class="boot-select">CHOOSE YOUR AGENT</div>
  <div class="boot-loading"><span>NOW LOADING . . .</span><span id="boot-pct">95%</span></div>
  <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
  <div class="boot-links">
    <a class="boot-line" href="https://end-of-eden.github.io/EXL/roster.html" onclick="return bootThenGo(event, this.href)">
      <span class="boot-dot green"></span>
      <span>
        <div class="boot-line-signal">SIGNAL CONNECT</div>
        <div class="boot-line-names">▸ Lilith · Eden</div>
      </span>
    </a>
    <a class="boot-line" href="https://end-of-eden.github.io/Synapse/roster.html" onclick="return bootThenGo(event, this.href)">
      <span class="boot-dot red"></span>
      <span>
        <div class="boot-line-signal">SIGNAL LOST</div>
        <div class="boot-line-names">▸ Syndrome · Seraph</div>
      </span>
    </a>
  </div>
</div>

<script>
function bootThenGo(e, url) {
  e.preventDefault();
  var fill = document.getElementById('boot-bar-fill');
  var pct = document.getElementById('boot-pct');
  var steps = [95, 97, 98, 99, 100];
  var i = 1; // 이미 95%에서 시작
  fill.style.animation = 'none';
  fill.style.opacity = '1';

  function step() {
    if (i >= steps.length) {
      document.body.classList.add('fade-out');
      setTimeout(function () { location.href = url; }, 350);
      return;
    }
    var v = steps[i];
    fill.style.width = v + '%';
    pct.textContent = v + '%';
    i++;
    setTimeout(step, 120 + Math.random() * 140);
  }
  step();
  return false;
}
</script>
<script src="sparkle.js"></script>
</body>
</html>
