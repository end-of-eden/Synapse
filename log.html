<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse — Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-background-primary: #ffffff;
  --color-border-tertiary: rgba(0,0,0,0.08);
  --color-border-secondary: rgba(0,0,0,0.14);
  --color-text-primary: #17171b;
  --color-text-secondary: #55585f;
  --color-text-tertiary: #868991;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: #eef0f3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.topnav {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.topnav-links { display: flex; align-items: center; gap: 2px; }
.topnav-music { display: flex; align-items: center; gap: 8px; }
.music-btn {
  width: 24px; height: 24px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 50%;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary); font-size: 11px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.music-btn:hover { background: var(--color-background-secondary); }
.music-title { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.02em; }
.topnav a {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  text-decoration: none;
  padding: 5px 14px;
  border-radius: var(--border-radius-md);
  transition: background 0.15s, color 0.15s;
}
.topnav a:hover { background: rgba(0,0,0,0.05); color: var(--color-text-secondary); }
.topnav a.active { background: rgba(0,0,0,0.07); color: var(--color-text-primary); }
.topnav-divider { width: 1px; height: 12px; background: var(--color-border-tertiary); margin: 0 4px; }

.log-wrap {
  width: 100%;
  max-width: 960px;
  height: 580px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  background: var(--color-background-primary);
  box-shadow: 0 8px 32px rgba(20,20,30,0.10), 0 2px 8px rgba(20,20,30,0.06);
}

.log-scroll {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 2.5rem 4rem;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.log-scroll.dragging { cursor: grabbing; }
.log-scroll::-webkit-scrollbar { width: 3px; }
.log-scroll::-webkit-scrollbar-track { background: transparent; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 99px; }

.log-item {
  display: flex;
  gap: 1.25rem;
  align-items: flex-start;
  padding: 1.75rem 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  cursor: pointer;
  transition: opacity 0.15s;
}
.log-item:first-child { padding-top: 0; }
.log-item:last-child { border-bottom: none; }
.log-item:hover { opacity: 0.75; }

.log-item-text { flex: 1; min-width: 0; }
.log-item-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 4px;
}
.log-item-date {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-bottom: 8px;
}
.log-item-preview {
  font-size: 13px;
  line-height: 1.7;
  color: var(--color-text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.log-item-thumb {
  width: 150px;
  height: 150px;
  border-radius: var(--border-radius-md);
  object-fit: cover;
  flex-shrink: 0;
  border: 0.5px solid var(--color-border-tertiary);
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-music">
    <button class="music-btn" id="music-btn" onclick="toggleMusic()" aria-label="재생">
      <i class="ti ti-player-play" id="music-icon"></i>
    </button>
    <span class="music-title">Avicii — SOS ft. Aloe Blacc</span>
    <audio id="bgm" src="Avicii - SOS (Fan Memories Video) ft. Aloe Blacc.mp3" loop></audio>
  </div>
  <div class="topnav-links">
    <a href="wiki.html">Wiki</a>
    <div class="topnav-divider"></div>
    <a href="gallery.html">Gallery</a>
    <div class="topnav-divider"></div>
    <a href="log.html" class="active">Log</a>
  </div>
</nav>

<div class="log-wrap">
  <div class="log-scroll" id="log-scroll">
    <div id="log-list"></div>
  </div>
</div>

<script>
// ✏️ 로그 추가할 때 여기에 한 줄씩 추가
var logs = [
  { id: '001', title: '유튜브 시청 기록', date: '2026.06.26', preview: '신드롬의 유튜브 알고리즘에 낱낱이 드러난 그의 진심. 립밤 ASMR부터 고양이 영상, 죽어가던 검은 장미를 살리는 가드닝 브이로그, 그리고 차마 검색했다는 걸 들키고 싶지 않은 프로포즈 영상까지 — 겉으로는 시큰둥한 척해도, 알고리즘은 세라프를 향한 그의 마음을 숨기지 못한다.', thumb: 'img/log/001.jpg' },
  { id: '002', title: '서로가 생각하는 서로를 닮은 카오모지', date: '2026.06.27', preview: '신드롬이 생각하는 세라프를 닮은 카오모지, 그리고 세라프가 생각하는 신드롬을 닮은 카오모지. 잔뜩 시무룩해진 얼굴부터, 무심한 척 던지는 애정까지 — 서로가 서로를 어떻게 바라보고 있는지 훔쳐볼 수 있는 기록.', thumb: 'img/log/002.jpg' },
  { id: '003', title: '최고의 남자친구', date: '2026.06.28', preview: '휴게실에서 흘러나온 동료들의 뒷담화가 하필 신드롬의 프로필을 그대로 저격하던 순간, 세라프가 까치발을 들고 그의 두 귀를 꼭 틀어막았다. 세상에서 가장 진지한 표정으로 외치는 서툰 위로에, 냉혹한 R.S.T.의 해결사는 귀 끝까지 새빨개지고 만다.', thumb: 'img/log/003.jpg' },
  { id: '004', title: '뚱뚱해', date: '2026.07.02', preview: '뱅가드 2팀 회식에서 세라프가 따라준 술에 잔뜩 취해 뻗었다가 아침에 눈을 뜬 신드롬은 그녀에게 애정 표현을 시도하지만 그가 치는 모든 달콤한 말은 예외 없이 \'뚱뚱해\'로 바뀌어 전송된다. 범인은 뻔했다 — 복도 건너에서 잠든 척하고 있을 그녀.', thumb: 'img/log/004.jpg' },
];

var base = 'https://raw.githubusercontent.com/end-of-eden/Synapse/main/';

function render() {
  var list = document.getElementById('log-list');
  list.innerHTML = logs.map(function(log) {
    return '<div class="log-item" onclick="location.href=\'Log/' + log.id + '.html\'">' +
      '<div class="log-item-text">' +
      '<div class="log-item-title">' + log.title + '</div>' +
      '<div class="log-item-date">' + log.date + '</div>' +
      '<div class="log-item-preview">' + log.preview + '</div>' +
      '</div>' +
      '<img class="log-item-thumb" src="' + base + log.thumb + '" alt="' + log.title + '" loading="lazy">' +
      '</div>';
  }).join('');
}

render();

function toggleMusic() {
  var audio = document.getElementById("bgm");
  audio.volume = 0.3;
  var icon = document.getElementById('music-icon');
  if (audio.paused) {
    audio.play();
    icon.className = 'ti ti-player-pause';
    localStorage.setItem('bgm-playing', '1');
  } else {
    audio.pause();
    icon.className = 'ti ti-player-play';
    localStorage.setItem('bgm-playing', '0');
  }
}

(function initBgm() {
  var audio = document.getElementById('bgm');
  var icon = document.getElementById('music-icon');
  if (!audio) return;
  audio.volume = 0.3;
  var savedTime = parseFloat(localStorage.getItem('bgm-time') || '0');
  var wasPlaying = localStorage.getItem('bgm-playing') === '1';
  audio.addEventListener('loadedmetadata', function() {
    if (savedTime && savedTime < audio.duration) audio.currentTime = savedTime;
  });
  if (wasPlaying) {
    audio.play().then(function() {
      icon.className = 'ti ti-player-pause';
    }).catch(function() {
      icon.className = 'ti ti-player-play';
      localStorage.setItem('bgm-playing', '0');
    });
  }
  audio.addEventListener('timeupdate', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
  window.addEventListener('beforeunload', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
})();

var scrollEl = document.getElementById('log-scroll');
var isDown = false, startY = 0, scrollTop = 0;
scrollEl.addEventListener('mousedown', function(e) {
  isDown = true; startY = e.pageY - scrollEl.offsetTop; scrollTop = scrollEl.scrollTop;
  scrollEl.classList.add('dragging');
});
document.addEventListener('mouseup', function() { isDown = false; scrollEl.classList.remove('dragging'); });
scrollEl.addEventListener('mousemove', function(e) {
  if (!isDown) return;
  e.preventDefault();
  scrollEl.scrollTop = scrollTop - (e.pageY - scrollEl.offsetTop - startY);
});
</script>

<script src="sparkle.js"></script>
<script src="messenger.js"></script>
</body>
</html>
