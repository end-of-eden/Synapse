<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f2f2f5;
  --color-background-tertiary: #e8e8ec;
  --color-text-primary: #17171b;
  --color-text-secondary: #55585f;
  --color-text-tertiary: #868991;
  --color-border-tertiary: rgba(0,0,0,0.08);
  --color-border-secondary: rgba(0,0,0,0.14);
  --color-border-primary: rgba(0,0,0,0.20);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: #eef0f3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  gap: 0;
}

/* 탭바 */
.topnav {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.topnav-links { display: flex; align-items: center; gap: 2px; }
.topnav-music { display: flex; align-items: center; gap: 8px; }
.topnav a {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  text-decoration: none;
  padding: 5px 14px;
  border-radius: var(--border-radius-md);
  transition: background 0.15s, color 0.15s;
}
.topnav a:hover { background: rgba(0,0,0,0.05); color: var(--color-text-secondary); }
.topnav a.active { background: rgba(0,0,0,0.07); color: var(--color-text-primary); }
.topnav-divider { width: 1px; height: 12px; background: var(--color-border-tertiary); margin: 0 4px; }

.wiki-wrap {
  display: flex;
  height: 580px;
  width: 100%;
  max-width: 960px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  background: var(--color-background-primary);
  box-shadow: 0 8px 32px rgba(20,20,30,0.10), 0 2px 8px rgba(20,20,30,0.06);
}
.standing-panel {
  flex: 2; flex-shrink: 0;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 0 1.5rem;
  background: var(--color-background-primary);
  border-right: 0.5px solid var(--color-border-tertiary);
  overflow: hidden;
}
.standing-panel::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 160px;
  background: linear-gradient(to top, rgba(15,15,20,0.92) 0%, transparent 100%);
  z-index: 0;
}
.standing-img {
  position: absolute;
  inset: 0;
  border-radius: 0;
  border: none;
  background: transparent;
  overflow: hidden;
}
.standing-img i { font-size: 28px; color: var(--color-text-tertiary); }
.standing-img span { font-size: 11px; color: var(--color-text-tertiary); }
.char-badge { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: var(--border-radius-md); margin-bottom: 6px; text-align: center; position: relative; z-index: 1; }
.char-name-panel { font-size: 18px; font-weight: 500; color: #f5f5f7; text-shadow: 0 1px 6px rgba(0,0,0,0.6); text-align: center; position: relative; z-index: 1; }
.char-codename { font-size: 11px; color: rgba(245,245,247,0.75); text-shadow: 0 1px 6px rgba(0,0,0,0.6); text-align: center; margin-top: 2px; position: relative; z-index: 1; margin-bottom: 1.5rem; }

.music-btn {
  width: 24px; height: 24px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 50%;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary); font-size: 11px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.music-btn:hover { background: var(--color-background-secondary); }
.music-title { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.02em; }
.wiki-panel { flex: 3; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.wiki-header {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 1.75rem 1rem;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.wiki-title { font-size: 20px; font-weight: 500; }
.heart-switcher { display: flex; align-items: center; gap: 6px; }
.heart-btn {
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: transform 0.15s, opacity 0.15s; line-height: 1;
  padding: 2px;
}
.heart-btn:hover { transform: scale(1.2); }
.heart-btn.active { transform: scale(1.1); }
.heart-btn:not(.active) { opacity: 0.4; }

.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 1.5rem 1.75rem 2rem;
  cursor: grab; user-select: none; -webkit-user-select: none;
}
.scroll-area.dragging { cursor: grabbing; }
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 99px; }

.section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 8px; margin-top: 1.5rem; }
.section-title:first-child { margin-top: 0; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.info-item { background: transparent; border-radius: 0; padding: 6px 2px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.info-label { font-size: 10px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.info-value { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.attr-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: var(--border-radius-md); margin-bottom: 0.75rem; }
.desc-block { font-size: 13px; line-height: 1.7; color: var(--color-text-secondary); }
.ability-block { background: var(--color-background-secondary); border-radius: 0; padding: 10px 12px; margin-bottom: 6px; font-size: 13px; line-height: 1.7; color: var(--color-text-secondary); }
.ability-block strong { font-weight: 500; color: var(--color-text-primary); display: block; margin-bottom: 3px; font-size: 12px; }
.tmi-block { background: var(--color-background-secondary); border-radius: 0; padding: 10px 12px; margin-bottom: 6px; }
.tmi-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.tmi-value { font-size: 13px; line-height: 1.6; color: var(--color-text-secondary); }
.log-block { font-size: 13px; line-height: 1.9; color: var(--color-text-secondary); white-space: pre-wrap; }
.note-list { list-style: none; padding: 0; }
.note-list li { font-size: 13px; line-height: 1.7; color: var(--color-text-secondary); padding: 3px 0 3px 14px; position: relative; }
.note-list li::before { content: '·'; position: absolute; left: 2px; color: var(--color-text-tertiary); }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1.25rem 0; }
.team-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.team-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-tertiary); }
.team-nav { display: flex; gap: 4px; }
.team-nav button { width: 26px; height: 26px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); font-size: 13px; }
.team-nav button:hover { background: var(--color-background-secondary); }
.member-card { display: flex; gap: 12px; align-items: center; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 0; background: var(--color-background-secondary); }
.member-avatar { width: 52px; height: 52px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--color-background-primary); }
.member-avatar i { font-size: 20px; color: var(--color-text-tertiary); }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.member-attr { font-size: 11px; padding: 2px 8px; border-radius: 99px; display: inline-block; font-weight: 600; }
.member-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; line-height: 1.5; }
.team-dots { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
.team-dot { width: 5px; height: 5px; border-radius: 99px; background: var(--color-border-secondary); transition: background 0.2s; }
.team-dot.active { background: var(--color-text-secondary); }

.theme-syndrome .char-badge { background: rgba(231,76,60,0.25); color: #ff8a75; }
.theme-syndrome .attr-tag { background: rgba(192,57,43,0.12); color: #c0392b; }
.theme-syndrome .wiki-title { color: #c0392b; }
.theme-seraph .char-badge { background: rgba(241,196,15,0.28); color: #ffe066; }
.theme-seraph .attr-tag { background: rgba(166,124,0,0.14); color: #a67c00; }
.theme-seraph .wiki-title { color: #a67c00; }

/* 속성별 색상 (공식 팔레트) */
.member-attr[data-attr="Pyre"]    { background: #e74c3c; color: #ffffff; }
.member-attr[data-attr="Fulmen"]  { background: #f1c40f; color: #1a1a1a; }
.member-attr[data-attr="Aqua"]    { background: #3498db; color: #ffffff; }
.member-attr[data-attr="Glacies"] { background: #8eccec; color: #12303f; }
.member-attr[data-attr="Aero"]    { background: #2ecc71; color: #ffffff; }
.member-attr[data-attr="Verde"]   { background: #6aaa64; color: #ffffff; }
</style>

<script>
function toggleMusic() {
  var audio = document.getElementById("bgm");
  audio.volume = 0.3;
  var icon = document.getElementById('music-icon');
  if (audio.paused) {
    audio.play();
    icon.className = 'ti ti-player-pause';
    localStorage.setItem('bgm-playing', '1');
  } else {
    audio.pause();
    icon.className = 'ti ti-player-play';
    localStorage.setItem('bgm-playing', '0');
  }
}

(function initBgm() {
  var audio = document.getElementById('bgm');
  var icon = document.getElementById('music-icon');
  if (!audio) return;
  audio.volume = 0.3;
  var savedTime = parseFloat(localStorage.getItem('bgm-time') || '0');
  var wasPlaying = localStorage.getItem('bgm-playing') === '1';
  audio.addEventListener('loadedmetadata', function() {
    if (savedTime && savedTime < audio.duration) audio.currentTime = savedTime;
  });
  if (wasPlaying) {
    audio.play().then(function() {
      icon.className = 'ti ti-player-pause';
    }).catch(function() {
      icon.className = 'ti ti-player-play';
      localStorage.setItem('bgm-playing', '0');
    });
  }
  audio.addEventListener('timeupdate', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
  window.addEventListener('beforeunload', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
})();

};

  { name: '카르마', attr: 'Fulmen', desc: 'S급 번개 속성 가이드. RST 소속.', img: 'https://raw.githubusercontent.com/end-of-eden/EXL/main/img/wiki/KARMA.png' },
  { name: '저스티스', attr: 'Aqua', desc: 'S급 물 속성 가이드. RST 소속.', img: 'https://raw.githubusercontent.com/end-of-eden/EXL/main/img/wiki/JUSTICE.png' },

];

  { name: '릴리스', attr: 'Verde', desc: '뱅가드 2팀 소속. 풀 속성 센티넬.', img: 'https://raw.githubusercontent.com/end-of-eden/EXL/main/img/wiki/LILITH.png' },

    eval: 'ARCH 내외에서 아이돌급 외모로 주목받는 최고의 미녀 센티넬. 겉으로는 나른하고 태평해 보이지만 실상은 계산이 빠르고 눈치가 좋다. 세라프와의 강제 각인 이후, 공식 기록상 가장 많은 징계 보고서가 작성된 파트너 조합.',
    personality: '타인의 시선이나 평가에 크게 신경 쓰지 않는 듯 보이나, 그 무심함은 철저히 만들어진 것이다. 스스로를 낮게 평가하면서도 그것을 드러내지 않고 화려한 외면으로 포장한다. 상대를 휘두르는 데 능하며, 필요하다면 애교도 쓰고 독설도 서슴지 않는다. 가이드를 가리지 않고 가이딩을 받는다는 탓에 헤프다는 소문이 있다.',
    abilities: [
      { label: '아이러니한 흑장미 (The Ironic Black Rose)', desc: 'ARCH 본부 내 제압 임무 성공률 최상위권의 S급 센티넬. 겉으로는 나른하고 무해해 보이지만, 전투가 시작되는 순간 완전히 다른 얼굴을 드러낸다. 독과 속박에 특화된 검은 장미와 가시덩굴의 능력은 아름다운 외모만큼이나 치명적이다. 세라프와의 매칭률 98%.' },
      { label: '[Passive] Pink Venom', desc: '풀 속성 파장이 피부 표면에 상시 발현되는 S급 센티넬 고유의 패시브 능력. 체향처럼 번지는 연분홍빛 독소가 근접한 대상의 감각을 서서히 교란시키며, 능력이 활성화될수록 눈동자가 형광빛으로 물들어간다. 본인은 이를 의식적으로 제어하지 않는다.' },

      { label: '주요 특징', value: '허리까지 내려오는 윤기 나는 흑발, 연분홍빛 눈동자 (능력 사용 시 형광빛으로 빛남). 날카롭게 올라간 눈매와 고양이를 닮은 인상으로 첫인상은 차갑고 도도하다는 평이 많다. 유난히 희고 깨끗한 피부.' },

function memberCard(m) {
  var avatarInner = m.img
    ? '<img src="' + m.img + '" style="width:100%;height:100%;object-fit:cover;border-radius:var(--border-radius-md);">'
    : '<i class="ti ti-user" aria-hidden="true"></i>';
  return '<div class="member-card"><div class="member-avatar">' + avatarInner + '</div>' +
    '<div class="member-info"><div class="member-name">' + m.name + '</div>' +
    '<span class="member-attr" data-attr="' + m.attr + '">' + m.attr + '</span>' +
    '<div class="member-desc">' + m.desc + '</div></div></div>';
}

function renderTeam() {
  var slot = document.getElementById('member-slot');
  if (!slot) return;
  slot.innerHTML = memberCard(data[current].team[teamIdx]);
  document.querySelectorAll('.team-dot').forEach(function(dot, i) {
    dot.className = 'team-dot' + (i === teamIdx ? ' active' : '');
  });
}

function teamPrev() { var d = data[current]; teamIdx = (teamIdx - 1 + d.team.length) % d.team.length; renderTeam(); }
function teamNext() { var d = data[current]; teamIdx = (teamIdx + 1) % d.team.length; renderTeam(); }

function buildContent(key) {
  var d = data[key];
  var infos = d.infos.map(function(i) {
    return '<div class="info-item"><div class="info-label">' + i.label + '</div><div class="info-value">' + i.value + '</div></div>';
  }).join('');
  var abilities = d.abilities.map(function(a) {
    return '<div class="ability-block"><strong>' + a.label + '</strong>' + a.desc + '</div>';
  }).join('');
  var visuals = d.visual.map(function(v) {
    return '<div class="tmi-block"><div class="tmi-label">' + v.label + '</div><div class="tmi-value">' + v.value + '</div></div>';
  }).join('');
  var tmis = d.tmi.map(function(t) {
    return '<div class="tmi-block"><div class="tmi-label">' + t.label + '</div><div class="tmi-value">' + t.value + '</div></div>';
  }).join('');
  var noteItems = d.notes.map(function(n) { return '<li>' + n + '</li>'; }).join('');
  var dots = d.team.map(function(_, i) {
    return '<div class="team-dot' + (i === 0 ? ' active' : '') + '"></div>';
  }).join('');

  var archiveSection = '';
  if (d.visual.length || d.tmi.length || d.notes.length || d.log) {
    archiveSection += '<div class="divider"></div>';
    if (d.visual.length) archiveSection += '<div class="section-title">Visual Profile</div>' + visuals;
    if (d.tmi.length) archiveSection += '<div class="section-title">TMI</div>' + tmis;
    if (d.notes.length) archiveSection += '<div class="section-title">Notes</div><ul class="note-list">' + noteItems + '</ul>';
    if (d.log) archiveSection += '<div class="section-title" style="margin-top:1.25rem;">Background Log</div><div class="log-block">' + d.log + '</div>';
  }

  return '<div class="section-title">Attribute</div>' +
    '<div class="attr-tag"><i class="ti ' + d.attrIcon + '" aria-hidden="true"></i>' + d.attrLabel + '</div>' +
    '<div class="section-title">Profile</div>' +
    '<div class="info-grid">' + infos + '</div>' +
    '<div class="divider"></div>' +
    '<div class="section-title">Official Evaluation</div>' +
    '<div class="desc-block">' + d.eval + '</div>' +
    '<div class="section-title" style="margin-top:1rem;">Personality</div>' +
    '<div class="desc-block">' + d.personality + '</div>' +
    '<div class="divider"></div>' +
    '<div class="section-title">Ability & Gear</div>' + abilities +
    archiveSection +
    '<div class="divider"></div>' +
    '<div class="team-section-header"><div class="team-label">' + d.teamLabel + '</div>' +
    '<div class="team-nav"><button onclick="teamPrev()" aria-label="prev"><i class="ti ti-chevron-left"></i></button>' +
    '<button onclick="teamNext()" aria-label="next"><i class="ti ti-chevron-right"></i></button></div></div>' +
    '<div id="member-slot"></div>' +
    '<div class="team-dots">' + dots + '</div>';
}

function updateHeartBtns(key) {
  document.getElementById('btn-syndrome').className = 'heart-btn' + (key === 'syndrome' ? ' active' : '');
  document.getElementById('btn-seraph').className = 'heart-btn' + (key === 'seraph' ? ' active' : '');
}

function render(key) {
  var d = data[key];
  teamIdx = 0;
  document.getElementById('wiki').className = 'wiki-wrap ' + d.theme;
  document.getElementById('standing-img-el').src = STANDING_IMG[key];
  document.getElementById('char-badge').textContent = d.badge;
  document.getElementById('char-name-panel').textContent = d.name;
  document.getElementById('char-codename').textContent = d.codename;
  document.getElementById('wiki-title').textContent = d.name;
  updateHeartBtns(key);
  document.getElementById('scroll-area').scrollTop = 0;
  document.getElementById('wiki-content').innerHTML = buildContent(key);
  renderTeam();
}

function switchTo(key) {
  if (current === key) return;
  current = key;
  render(current);
}

var scrollEl = document.getElementById('scroll-area');
var isDown = false, startY = 0, scrollTop = 0;
scrollEl.addEventListener('mousedown', function(e) {
  isDown = true; startY = e.pageY - scrollEl.offsetTop; scrollTop = scrollEl.scrollTop;
  scrollEl.classList.add('dragging');
});
document.addEventListener('mouseup', function() { isDown = false; scrollEl.classList.remove('dragging'); });
scrollEl.addEventListener('mousemove', function(e) {
  if (!isDown) return;
  e.preventDefault();
  scrollEl.scrollTop = scrollTop - (e.pageY - scrollEl.offsetTop - startY);
});

var params = new URLSearchParams(window.location.search);
var initial = params.get('char') === 'seraph' ? 'seraph' : 'syndrome';
current = initial;
render(initial);
</script>
