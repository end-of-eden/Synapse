<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #eef0f3;
  color: #17171b;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 0.4s ease;
}

body.fade-out {
  opacity: 0;
  transition: opacity 0.4s ease;
}

.boot-wrap {
  width: 100%;
  max-width: 360px;
  padding: 24px;
}

.boot-bar-track {
  width: 100%;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 20px;
}
.boot-bar-fill {
  height: 100%;
  width: 90%;
  background: #4a4a52;
  animation: boot-bar-blink 1.4s ease-in-out infinite;
}
@keyframes boot-bar-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

.boot-loading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.4);
  margin-bottom: 8px;
}

.boot-line {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.5);
  margin-bottom: 8px;
  text-decoration: none;
  cursor: pointer;
  width: fit-content;
  transition: color 0.15s, opacity 0.15s;
}
.boot-line:hover {
  color: rgba(0,0,0,0.9);
  opacity: 0.8;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
.boot-dot {
  width: 6px;
  height: 6px;
  border-radius: 99px;
  flex-shrink: 0;
  animation: pulse-dot 1.4s ease-in-out infinite;
}
.boot-dot.red { background: #e63946; box-shadow: 0 0 6px #e63946; }
.boot-dot.green { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; animation: none; }

.boot-select {
  display: block;
  margin-bottom: 18px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: rgba(0,0,0,0.85);
}
</style>
</head>
<body>

<div class="boot-wrap">
  <div class="boot-loading"><span>NOW LOADING</span><span>95%</span></div>
  <div class="boot-bar-track"><div class="boot-bar-fill"></div></div>
  <div class="boot-select">SELECT YOUR TEAMMATE</div>
  <a class="boot-line" href="https://end-of-eden.github.io/EXL/"><span class="boot-dot green"></span>CODE EL · SIGNAL CONNECT</a>
  <a class="boot-line" href="https://end-of-eden.github.io/Synapse/"><span class="boot-dot red"></span>CODE SS · SIGNAL LOST</a>
</div>

<script src="sparkle.js"></script>
</body>
</html>
