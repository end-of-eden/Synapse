<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse — Gallery</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f2f2f5;
  --color-border-tertiary: rgba(0,0,0,0.08);
  --color-border-secondary: rgba(0,0,0,0.14);
  --color-text-primary: #17171b;
  --color-text-secondary: #55585f;
  --color-text-tertiary: #868991;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: #eef0f3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.topnav {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.topnav-links { display: flex; align-items: center; gap: 2px; }
.topnav-music { display: flex; align-items: center; gap: 8px; }
.music-btn {
  width: 24px; height: 24px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 50%;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary); font-size: 11px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.music-btn:hover { background: var(--color-background-secondary); }
.music-title { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.02em; }
.topnav a {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  text-decoration: none;
  padding: 5px 14px;
  border-radius: var(--border-radius-md);
  transition: background 0.15s, color 0.15s;
}
.topnav a:hover { background: rgba(0,0,0,0.05); color: var(--color-text-secondary); }
.topnav a.active { background: rgba(0,0,0,0.07); color: var(--color-text-primary); }
.topnav-divider { width: 1px; height: 12px; background: var(--color-border-tertiary); margin: 0 4px; }

.gallery-wrap {
  width: 100%;
  max-width: 960px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  background: var(--color-background-primary);
  box-shadow: 0 8px 32px rgba(20,20,30,0.10), 0 2px 8px rgba(20,20,30,0.06);
  height: 580px;
}

.gallery-scroll {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1.75rem;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.gallery-scroll.dragging { cursor: grabbing; }
.gallery-scroll::-webkit-scrollbar { width: 3px; }
.gallery-scroll::-webkit-scrollbar-track { background: transparent; }
.gallery-scroll::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 99px; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.gallery-item {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: var(--border-radius-md);
  overflow: hidden;
  cursor: pointer;
  background: var(--color-background-secondary);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.gallery-item:hover img {
  transform: scale(1.04);
}

.gallery-item-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  transition: background 0.3s ease;
}

.gallery-item:hover .gallery-item-overlay {
  background: rgba(0,0,0,0.55);
}

.gallery-item-title {
  font-size: 12px;
  font-weight: 300;
  color: rgba(255,255,255,0);
  letter-spacing: 0.03em;
  transition: color 0.3s ease;
  line-height: 1.4;
  text-align: center;
}

.gallery-item:hover .gallery-item-title {
  color: rgba(255,255,255,0.9);
}

/* 팝업 */
.popup-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,5,8,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.popup-bg.open { display: flex; }

.popup-inner {
  position: relative;
  max-width: 800px;
  width: 90%;
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

.popup-inner img {
  width: 100%;
  display: block;
  max-height: 85vh;
  object-fit: contain;
  background: #050508;
}

.popup-title {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(to top, rgba(5,5,8,0.85) 0%, transparent 100%);
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.03em;
}

.popup-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none;
  cursor: pointer;
  color: #fff;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.popup-close:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-music">
    <button class="music-btn" id="music-btn" onclick="toggleMusic()" aria-label="재생">
      <i class="ti ti-player-play" id="music-icon"></i>
    </button>
    <span class="music-title">Avicii — SOS ft. Aloe Blacc</span>
    <audio id="bgm" src="Avicii - SOS (Fan Memories Video) ft. Aloe Blacc.mp3" loop></audio>
  </div>
  <div class="topnav-links">
    <a href="wiki.html">Wiki</a>
    <div class="topnav-divider"></div>
    <a href="gallery.html" class="active">Gallery</a>
    <div class="topnav-divider"></div>
    <a href="log.html">Log</a>
  </div>
</nav>

<div class="gallery-wrap">
  <div class="gallery-scroll" id="gallery-scroll">
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</div>

<!-- 팝업 -->
<div class="popup-bg" id="popup-bg" onclick="closePopup(event)">
  <div class="popup-inner">
    <img id="popup-img" src="" alt="">
    <div class="popup-title" id="popup-title"></div>
    <button class="popup-close" onclick="closePopup()">✕</button>
  </div>
</div>

<script>
// ✏️ 이미지 추가할 때 여기에 한 줄씩 추가하면 됨
var images = [
  { src: 'Syndrome_1.png', title: 'SYNDROME', color: 'rgba(255,140,60,0.9)' },
  { src: 'Seraph_1.png', title: 'SERAPH', color: 'rgba(255,214,0,0.9)' },
];

var base = 'https://raw.githubusercontent.com/end-of-eden/EXL/main/img/gallery/';

function render() {
  var grid = document.getElementById('gallery-grid');
  grid.innerHTML = images.map(function(img, i) {
    return '<div class="gallery-item" onclick="openPopup(' + i + ')"' +
      ' onmouseover="this.querySelector(\'.gallery-item-title\').style.color=\'' + img.color + '\'"' +
      ' onmouseout="this.querySelector(\'.gallery-item-title\').style.color=\'rgba(0,0,0,0)\'">' +
      '<img src="' + base + img.src + '" alt="' + img.title + '" loading="lazy">' +
      '<div class="gallery-item-overlay">' +
      '<div class="gallery-item-title">' + img.title + '</div>' +
      '</div></div>';
  }).join('');
}

function openPopup(i) {
  var img = images[i];
  document.getElementById('popup-img').src = base + img.src;
  document.getElementById('popup-title').textContent = img.title;
  document.getElementById('popup-bg').classList.add('open');
}

function closePopup(e) {
  if (!e || e.target === document.getElementById('popup-bg') || e.currentTarget.classList.contains('popup-close')) {
    document.getElementById('popup-bg').classList.remove('open');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePopup();
});

render();

function toggleMusic() {
  var audio = document.getElementById("bgm");
  audio.volume = 0.3;
  var icon = document.getElementById('music-icon');
  if (audio.paused) {
    audio.play();
    icon.className = 'ti ti-player-pause';
    localStorage.setItem('bgm-playing', '1');
  } else {
    audio.pause();
    icon.className = 'ti ti-player-play';
    localStorage.setItem('bgm-playing', '0');
  }
}

(function initBgm() {
  var audio = document.getElementById('bgm');
  var icon = document.getElementById('music-icon');
  if (!audio) return;
  audio.volume = 0.3;
  var savedTime = parseFloat(localStorage.getItem('bgm-time') || '0');
  var wasPlaying = localStorage.getItem('bgm-playing') === '1';
  audio.addEventListener('loadedmetadata', function() {
    if (savedTime && savedTime < audio.duration) audio.currentTime = savedTime;
  });
  if (wasPlaying) {
    audio.play().then(function() {
      icon.className = 'ti ti-player-pause';
    }).catch(function() {
      icon.className = 'ti ti-player-play';
      localStorage.setItem('bgm-playing', '0');
    });
  }
  audio.addEventListener('timeupdate', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
  window.addEventListener('beforeunload', function() {
    localStorage.setItem('bgm-time', audio.currentTime);
  });
})();

var scrollEl = document.getElementById('gallery-scroll');
var isDown = false, startY = 0, scrollTop = 0;
scrollEl.addEventListener('mousedown', function(e) {
  isDown = true; startY = e.pageY - scrollEl.offsetTop; scrollTop = scrollEl.scrollTop;
  scrollEl.classList.add('dragging');
});
document.addEventListener('mouseup', function() { isDown = false; scrollEl.classList.remove('dragging'); });
scrollEl.addEventListener('mousemove', function(e) {
  if (!isDown) return;
  e.preventDefault();
  scrollEl.scrollTop = scrollTop - (e.pageY - scrollEl.offsetTop - startY);
});
</script>

<script src="sparkle.js"></script>
<script src="messenger.js"></script>
</body>
</html>
